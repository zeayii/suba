# =============================================================================
# Publish - Suba (Beta)
#
# Organization: zeayii
# Project: suba
#
# 发布目标：
#   - CPU 包：win-x64 / linux-x64 / osx-x64
#   - GPU 包：win-x64 / linux-x64
#   - 产物结构：zip 内统一为 suba/ 目录
#   - Beta 包保留调试文件（不做最小化裁剪）
#
# 命名规则：
#   - suba-v{version}-{rid}-cpu-beta.zip
#   - suba-v{version}-{rid}-gpu-beta.zip
#
# 核心约束：
#   - 版本号必须严格 X.Y.Z-beta.N
#   - 发布到 GitHub Release（预发布）
#   - Beta 包保留调试符号文件
# =============================================================================

name: Publish - Suba Beta

on:
    workflow_dispatch:
        inputs:
            version:
                description: "Beta version (strict X.Y.Z-beta.N, e.g. 0.1.0-beta.1)"
                required: true
                type: string

permissions:
    contents: write

jobs:
    publish:
        uses: ./.github/workflows/suba-reusable-build.yml
        with:
            version: ${{ inputs.version }}
            version_channel: beta
            include_gpu: true
            strip_debug_files: false
            create_release: true
            prerelease: true
